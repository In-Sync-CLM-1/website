name: Deploy Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'supabase/**'
      - 'agent-backend/**'
      - '**/*.md'
      - '.github/workflows/supabase-deploy.yml'

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and deploy frontend
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      # VITE_* values come from the committed .env.production (public keys only)
      - run: npm run build
      - name: Add SPA fallback
        run: printf '/*  /index.html  200\n' > dist/_redirects
      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy dist --project-name=website-sync --branch=main --commit-dirty=true
