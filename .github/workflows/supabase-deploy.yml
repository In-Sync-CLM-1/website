name: Deploy Supabase

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/**'
      - '.github/workflows/supabase-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Push migrations and deploy edge functions
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      # The destination DB was seeded from a pg_dump clone (2026-06-01 migration
      # off the old Lovable org), so all migrations through 20251016060140 are
      # already applied. Baseline them so `db push` only runs newer ones.
      - name: Mark cloned migrations as applied
        run: |
          versions=$(ls supabase/migrations | sed 's/_.*//' | sort -u | awk '$1 <= "20251016060140"')
          [ -z "$versions" ] && { echo "none"; exit 0; }
          values=$(echo "$versions" | awk 'BEGIN{ORS=""} {printf (NR==1?"":",") "(\x27" $1 "\x27)"}')
          sql="INSERT INTO supabase_migrations.schema_migrations(version) VALUES $values ON CONFLICT DO NOTHING;"
          body=$(jq -nc --arg q "$sql" '{query:$q}')
          curl -sS -X POST "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_ID/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" -H "Content-Type: application/json" -d "$body"; echo

      - name: Push database migrations
        run: supabase db push --linked

      - name: Determine functions to deploy
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then echo "mode=all" >> "$GITHUB_OUTPUT"; exit 0; fi
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            echo "mode=all" >> "$GITHUB_OUTPUT"; exit 0; fi
          CHANGED=$(git diff --name-only "$BEFORE" HEAD)
          # Shared code is bundled into every function -> a _shared change is the only
          # case that legitimately requires redeploying all functions.
          if echo "$CHANGED" | grep -qE '^supabase/functions/_shared/'; then echo "mode=all" >> "$GITHUB_OUTPUT"; exit 0; fi
          # Functions whose source directory changed.
          DIR_SLUGS=$(echo "$CHANGED" | awk -F/ '$1=="supabase" && $2=="functions" && $3!="" && $3!="_shared" {print $3}')
          # Functions whose config.toml verify_jwt was added or flipped: redeploy ONLY
          # those, never the whole fleet. Diff the parsed [functions.X] verify_jwt maps.
          CFG_SLUGS=""
          if echo "$CHANGED" | grep -qE '^supabase/config\.toml$'; then
            parse() { awk '/^\[functions\.[A-Za-z0-9_-]+\]/{fn=$0;gsub(/^\[functions\.|\]$/,"",fn);next} /^\[/{fn=""} fn!="" && $1=="verify_jwt"{print fn"="$3}'; }
            OLD=$(git show "$BEFORE:supabase/config.toml" 2>/dev/null | parse | sort)
            NEW=$(git show "HEAD:supabase/config.toml" 2>/dev/null | parse | sort)
            CFG_SLUGS=$(comm -13 <(printf '%s\n' "$OLD") <(printf '%s\n' "$NEW") | sed -E 's/=.*//')
          fi
          SLUGS=$(printf '%s\n%s\n' "$DIR_SLUGS" "$CFG_SLUGS" | sed '/^$/d' | sort -u | tr '\n' ' ')
          if [ -z "$SLUGS" ]; then echo "mode=none" >> "$GITHUB_OUTPUT"; else echo "mode=changed" >> "$GITHUB_OUTPUT"; echo "slugs=$SLUGS" >> "$GITHUB_OUTPUT"; fi

      - name: Deploy edge functions
        run: |
          case "${{ steps.changed.outputs.mode }}" in
            all) supabase functions deploy --project-ref "$SUPABASE_PROJECT_ID" ;;
            changed) for slug in ${{ steps.changed.outputs.slugs }}; do supabase functions deploy "$slug" --project-ref "$SUPABASE_PROJECT_ID"; done ;;
            none) echo "No edge functions changed" ;;
          esac
